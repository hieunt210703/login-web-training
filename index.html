<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tài khoản cá nhân</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="app-panel" id="appPanel" aria-labelledby="pageTitle">
        <div class="panel-header">
          <div>
            <div class="brand-mark" aria-hidden="true">T</div>
            <h1 id="pageTitle">Đăng nhập</h1>
            <p class="subtitle" id="pageSubtitle">
              Vui lòng nhập email và mật khẩu để tiếp tục.
            </p>
          </div>
          <button class="profile-icon hidden" id="profileIcon" type="button" aria-label="Homepage">
            <span id="profileInitial">T</span>
          </button>
        </div>

        <form class="auth-form" id="loginForm" novalidate>
          <label for="loginEmail">Email</label>
          <input
            id="loginEmail"
            name="email"
            type="text"
            inputmode="email"
            autocomplete="email"
            placeholder="you@example.com"
            data-error="loginEmailError"
          />
          <p class="field-error" id="loginEmailError"></p>

          <label for="loginPassword">Mật khẩu</label>
          <input
            id="loginPassword"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="Nhập mật khẩu"
            data-error="loginPasswordError"
          />
          <p class="field-error" id="loginPasswordError"></p>

          <button type="submit">Đăng nhập</button>
          <button class="link-button" id="showRegister" type="button">
            Tạo tài khoản mới
          </button>
        </form>

        <form class="auth-form hidden" id="registerForm" novalidate>
          <label for="fullName">Họ và tên</label>
          <input
            id="fullName"
            name="fullName"
            type="text"
            autocomplete="name"
            placeholder="Nguyễn Văn A"
            data-error="fullNameError"
          />
          <p class="field-error" id="fullNameError"></p>

          <label for="gender">Giới tính</label>
          <select id="gender" name="gender" data-error="genderError">
            <option value="">Chọn giới tính</option>
            <option value="Nam">Nam</option>
            <option value="Nữ">Nữ</option>
            <option value="Khác">Khác</option>
          </select>
          <p class="field-error" id="genderError"></p>

          <label for="birthday">Ngày sinh</label>
          <input id="birthday" name="birthday" type="date" data-error="birthdayError" />
          <p class="field-error" id="birthdayError"></p>

          <label for="registerEmail">Email</label>
          <input
            id="registerEmail"
            name="email"
            type="text"
            inputmode="email"
            autocomplete="email"
            placeholder="you@example.com"
            data-error="registerEmailError"
          />
          <p class="field-error" id="registerEmailError"></p>

          <label for="registerPassword">Mật khẩu</label>
          <input
            id="registerPassword"
            name="password"
            type="password"
            autocomplete="new-password"
            placeholder="Tối thiểu 6 ký tự"
            data-error="registerPasswordError"
          />
          <p class="field-error" id="registerPasswordError"></p>

          <label for="hobbies">Sở thích <span class="optional">(Optional)</span></label>
          <textarea
            id="hobbies"
            name="hobbies"
            rows="3"
            placeholder="Ví dụ: đọc sách, bóng đá, du lịch"
            data-error="hobbiesError"
          ></textarea>
          <p class="field-error" id="hobbiesError"></p>

          <button type="submit">Đăng ký</button>
          <button class="link-button" id="showLogin" type="button">
            Đã có tài khoản
          </button>
        </form>

        <section class="home-view hidden" id="homeView" aria-label="Homepage">
          <div class="home-card profile-card">
            <div class="avatar" id="profileAvatar">T</div>
            <div>
              <h2 id="homeGreeting">Xin chào</h2>
              <p id="profileEmail">email@example.com</p>
            </div>
          </div>

          <dl class="profile-details">
            <div>
              <dt>Giới tính</dt>
              <dd id="profileGender"></dd>
            </div>
            <div>
              <dt>Ngày sinh</dt>
              <dd id="profileBirthday"></dd>
            </div>
            <div>
              <dt>Sở thích</dt>
              <dd id="profileHobbies"></dd>
            </div>
          </dl>

          <form class="settings-card" id="editProfileForm" novalidate>
            <h3>Edit profile</h3>

            <label for="editFullName">Họ và tên</label>
            <input id="editFullName" name="fullName" type="text" data-error="editFullNameError" />
            <p class="field-error" id="editFullNameError"></p>

            <label for="editGender">Giới tính</label>
            <select id="editGender" name="gender" data-error="editGenderError">
              <option value="">Chọn giới tính</option>
              <option value="Nam">Nam</option>
              <option value="Nữ">Nữ</option>
              <option value="Khác">Khác</option>
            </select>
            <p class="field-error" id="editGenderError"></p>

            <label for="editBirthday">Ngày sinh</label>
            <input id="editBirthday" name="birthday" type="date" data-error="editBirthdayError" />
            <p class="field-error" id="editBirthdayError"></p>

            <label for="editEmail">Email</label>
            <input id="editEmail" name="email" type="text" inputmode="email" data-error="editEmailError" />
            <p class="field-error" id="editEmailError"></p>

            <label for="editHobbies">Sở thích <span class="optional">(Optional)</span></label>
            <textarea id="editHobbies" name="hobbies" rows="3" data-error="editHobbiesError"></textarea>
            <p class="field-error" id="editHobbiesError"></p>

            <button type="submit">Lưu profile</button>
          </form>

          <form class="settings-card" id="changePasswordForm" novalidate>
            <h3>Đổi mật khẩu</h3>

            <label for="currentPassword">Mật khẩu hiện tại</label>
            <input
              id="currentPassword"
              name="currentPassword"
              type="password"
              autocomplete="current-password"
              data-error="currentPasswordError"
            />
            <p class="field-error" id="currentPasswordError"></p>

            <label for="newPassword">Mật khẩu mới</label>
            <input
              id="newPassword"
              name="newPassword"
              type="password"
              autocomplete="new-password"
              data-error="newPasswordError"
            />
            <p class="field-error" id="newPasswordError"></p>

            <label for="confirmPassword">Nhập lại mật khẩu mới</label>
            <input
              id="confirmPassword"
              name="confirmPassword"
              type="password"
              autocomplete="new-password"
              data-error="confirmPasswordError"
            />
            <p class="field-error" id="confirmPasswordError"></p>

            <button type="submit">Cập nhật mật khẩu</button>
          </form>

          <form class="settings-card danger-zone" id="deleteAccountForm" novalidate>
            <h3>Xóa tài khoản</h3>
            <p class="danger-copy">Sau khi xóa, tài khoản demo sẽ bị gỡ khỏi trình duyệt này.</p>

            <label for="deletePassword">Nhập mật khẩu để xác nhận</label>
            <input
              id="deletePassword"
              name="deletePassword"
              type="password"
              autocomplete="current-password"
              data-error="deletePasswordError"
            />
            <p class="field-error" id="deletePasswordError"></p>

            <button class="danger-button" type="submit">Xóa tài khoản</button>
          </form>

          <button class="logout-button" id="logoutButton" type="button">Đăng xuất</button>
        </section>

        <p class="message" id="message" role="status" aria-live="polite"></p>
      </section>
    </main>

    <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

    <script src="app.js"></script>
  </body>
</html>
